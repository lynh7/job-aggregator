apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: job-aggregator
  namespace: stag01
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: internal-monitoring-gateway
      namespace: monitoring
      sectionName: https
  hostnames:
    - job-aggregator.cluster.home.tlta.online
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /job-api
      backendRefs:
        - kind: Service
          name: job-aggregator-job-api
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /candidate-api
      backendRefs:
        - kind: Service
          name: job-aggregator-candidate-api
          port: 8100
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - kind: Service
          name: job-aggregator-ui-web
          port: 8080
