steps:
  - name: gcr.io/cloud-builders/git
    entrypoint: bash
    args:
      - -ceu
      - |
        git clone "${_REPO_URL}" /workspace/src
        cd /workspace/src
        git checkout "${_REVISION}"

  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    secretEnv:
      - GHCR_TOKEN
    args:
      - -ceu
      - |
        cd /workspace/src

        echo "${GHCR_TOKEN}" | docker login ghcr.io --username "${_GHCR_USERNAME}" --password-stdin

        docker build \
          --label "org.opencontainers.image.source=https://github.com/${_GITHUB_REPOSITORY}" \
          --label "org.opencontainers.image.revision=${_REVISION}" \
          -f "${_DOCKERFILE}" \
          -t "${_GHCR_IMAGE}:${_REVISION}" \
          -t "${_GHCR_IMAGE}:${_SHORT_SHA}" \
          -t "${_GHCR_IMAGE}:latest" \
          "${_CONTEXT}"

        docker push "${_GHCR_IMAGE}:${_REVISION}"
        docker push "${_GHCR_IMAGE}:${_SHORT_SHA}"
        docker push "${_GHCR_IMAGE}:latest"

options:
  machineType: E2_STANDARD_2
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/ghcr-token/versions/latest
      env: GHCR_TOKEN
