services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./data/nats:/data
    restart: unless-stopped
  api:
    image: job-aggregator-api:latest
    build:
      context: .
      dockerfile: docker/job-api.Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - nats
  candidate-api:
    image: job-aggregator-candidate-api:latest
    build:
      context: .
      dockerfile: docker/candidate-api.Dockerfile
    env_file: .env
    ports:
      - "8100:8100"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - nats
  candidate-worker:
    image: job-aggregator-candidate-worker:latest
    build:
      context: .
      dockerfile: docker/candidate-worker.Dockerfile
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on:
      - nats
