steps:
  - id: login-ghcr
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    secretEnv:
      - GHCR_TOKEN
    args:
      - -ceu
      - |
        echo "$$GHCR_TOKEN" | docker login ghcr.io --username trthienan17 --password-stdin

  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - ${_DOCKERFILE}
      - -t
      - ${_GHCR_IMAGE}:$COMMIT_SHA
      - -t
      - ${_GHCR_IMAGE}:latest
      - ${_CONTEXT}

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_GHCR_IMAGE}:$COMMIT_SHA

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_GHCR_IMAGE}:latest

substitutions:
  _GHCR_IMAGE: ghcr.io/trthienan17/my-app
  _DOCKERFILE: docker/job-api.Dockerfile
  _CONTEXT: .
  _GITHUB_REPOSITORY: unknown
  _GITHUB_REF_NAME: main

options:
  logging: CLOUD_LOGGING_ONLY

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/ghcr-token/versions/latest
      env: GHCR_TOKEN
