fullnameOverride: candidate-api
replicaCount: 2
image:
  repository: job-aggregator-candidate-api
  tag: latest
containerPorts:
  - name: http
    containerPort: 8100
service:
  enabled: true
  port: 8100
  targetPort: 8100
envFrom:
  - secretRef:
      name: job-aggregator-env
volumeMounts:
  - name: data
    mountPath: /app/data
volumes:
  - name: data
    persistentVolumeClaim:
      claimName: job-aggregator-data
readinessProbe:
  httpGet:
    path: /api/v1/health
    port: 8100
livenessProbe:
  httpGet:
    path: /api/v1/health
    port: 8100

