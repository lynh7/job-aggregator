server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location = /config.js {
    add_header Cache-Control 'no-store';
    try_files $uri =404;
  }

  location / {
    try_files $uri /index.html;
  }
}
