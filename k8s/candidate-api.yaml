apiVersion: apps/v1
kind: Deployment
metadata:
  name: candidate-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: candidate-api
  template:
    metadata:
      labels:
        app: candidate-api
    spec:
      containers:
        - name: candidate-api
          image: job-aggregator-candidate-api:replace-with-git-sha
          ports:
            - containerPort: 8100
          envFrom:
            - secretRef:
                name: job-aggregator-env
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: job-aggregator-data
---
apiVersion: v1
kind: Service
metadata:
  name: candidate-api
spec:
  selector:
    app: candidate-api
  ports:
    - port: 8100
      targetPort: 8100
