name: Validate Helm Chart

on:
  workflow_call:
    inputs:
      chart-path:
        description: 'Path to the chart directory to validate'
        required: true
        type: string
      release-name:
        description: 'Helm release name used for template rendering'
        required: false
        type: string
        default: job-aggregator
      use-kubeconform:
        description: 'Run kubeconform schema validation after helm template'
        required: false
        type: boolean
        default: true

jobs:
  validate:
    runs-on:
      - self-hosted
    strategy:
      fail-fast: false
      matrix:
        case:
          - name: default
            values_file: ''
          - name: browser-crawler
            values_file: examples/browser-crawler.values.yaml
          - name: existing-shared-pvc
            values_file: examples/existing-shared-pvc.values.yaml
          - name: nats
            values_file: examples/nats.values.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Set up Kubeconform
        if: ${{ inputs.use-kubeconform }}
        uses: bmuschko/setup-kubeconform@v1

      - name: Render chart (${{ matrix.case.name }})
        run: |
          if [ -n "${{ matrix.case.values_file }}" ]; then
            helm template "${{ inputs.release-name }}" "${{ inputs.chart-path }}" \
              -f "${{ inputs.chart-path }}/${{ matrix.case.values_file }}" > rendered.yaml
          else
            helm template "${{ inputs.release-name }}" "${{ inputs.chart-path }}" > rendered.yaml
          fi

      - name: Schema-validate rendered manifests
        if: ${{ inputs.use-kubeconform }}
        run: |
          mkdir -p .kubeconform-cache
          attempts=0
          max_attempts=3
          while true; do
            attempts=$((attempts + 1))
            echo "kubeconform attempt ${attempts}/${max_attempts}"
            set +e
            output=$(kubeconform \
              -cache .kubeconform-cache \
              -schema-location default \
              -summary \
              -verbose \
              rendered.yaml 2>&1)
            status=$?
            set -e
            printf '%s\n' "$output"

            if [ "$status" -eq 0 ]; then
              break
            fi

            if [ "$attempts" -ge "$max_attempts" ]; then
              exit "$status"
            fi

            if ! printf '%s' "$output" | grep -Eqi 'failed downloading schema|giving up after|timeout|temporary failure|connection reset|tls handshake timeout|i/o timeout|no such host|failed to verify certificate|x509'; then
              exit "$status"
            fi

            sleep 5
          done
