name: Build Container Via Cloud Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloud-build-main
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GHCR_IMAGE: ghcr.io/trthienan17/my-app
  BUILD_CONTEXT: .
  DOCKERFILE: docker/job-api.Dockerfile

jobs:
  cloud-build:
    runs-on:
      - self-hosted
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Export CLOUDSDK_PYTHON
        run: |
          PYTHON_BIN=$(python3 -c 'import sys; print(sys.executable)')
          echo "Using Python: ${PYTHON_BIN}"
          ${PYTHON_BIN} --version
          echo "CLOUDSDK_PYTHON=${PYTHON_BIN}" >> $GITHUB_ENV

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Verify gcloud installation
        run: gcloud --version
      - name: Stop if monthly Cloud Build usage too high
        env:
          PROJECT_ID: ${{ env.GCP_PROJECT_ID }}
          MAX_BUILD_MINUTES: "2200"
        run: |
          python3 - <<'PY'
          import json, subprocess, datetime, sys

          project = "${PROJECT_ID}"
          limit = int("${MAX_BUILD_MINUTES}")

          now = datetime.datetime.utcnow()
          month_start = now.replace(day=1, hour=0, minute=0, second=0, microsecond=0).isoformat() + "Z"

          cmd = [
              "gcloud", "builds", "list",
              f"--project={project}",
              f"--filter=createTime>={month_start}",
              "--format=json"
          ]
          out = subprocess.check_output(cmd, text=True)
          builds = json.loads(out)

          total_seconds = 0
          for b in builds:
              start = b.get("startTime")
              finish = b.get("finishTime")
              if not start or not finish:
                  continue
              s = datetime.datetime.fromisoformat(start.replace("Z", "+00:00"))
              f = datetime.datetime.fromisoformat(finish.replace("Z", "+00:00"))
              total_seconds += max(0, (f - s).total_seconds())

          minutes = total_seconds / 60
          print(f"Cloud Build minutes this month: {minutes:.1f}")
          print(f"Guard limit: {limit}")

          if minutes >= limit:
              print("Build blocked: monthly Cloud Build usage limit reached.", file=sys.stderr)
              sys.exit(1)
          PY
          
      - name: Submit remote build
        env:
          CLOUDSDK_CORE_DISABLE_PROMPTS: "1"
        run: |
          echo "Submitting Cloud Build for ${GHCR_IMAGE}:${GITHUB_SHA}"
          PROJECT_ID="$(gcloud projects describe "${GCP_PROJECT_ID}" --format='value(projectId)')"
          echo "Using project: ${PROJECT_ID}"
          gcloud builds submit \
            --project="${PROJECT_ID}" \
            --config=cloudbuild.yaml \
            --substitutions=COMMIT_SHA="${GITHUB_SHA}",SHORT_SHA="${GITHUB_SHA::7}",_GHCR_IMAGE="${GHCR_IMAGE}",_DOCKERFILE="${DOCKERFILE}",_CONTEXT="${BUILD_CONTEXT}",_GITHUB_REPOSITORY="${GITHUB_REPOSITORY}",_GITHUB_REF_NAME="${GITHUB_REF_NAME}"
