name: Build Container Via Cloud Build

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'candidate_service/**'
      - 'crawler_service/**'
      - 'docker/**'
      - 'pyproject.toml'
      - '.dockerignore'
      - 'cloudbuild.remote.yaml'
      - '.github/workflows/build-via-cloud-build.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cloud-build-main
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

jobs:
  detect-images:
    runs-on:
      - self-hosted
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      count: ${{ steps.detect.outputs.count }}
      names: ${{ steps.detect.outputs.names }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect images to build
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          images = {
              'job-api': {
                  'dockerfile': 'docker/job-api.Dockerfile',
                  'image': 'ghcr.io/lynh7/job-aggregator-job-api',
              },
              'candidate-api': {
                  'dockerfile': 'docker/candidate-api.Dockerfile',
                  'image': 'ghcr.io/lynh7/job-aggregator-candidate-api',
              },
              'candidate-worker': {
                  'dockerfile': 'docker/candidate-worker.Dockerfile',
                  'image': 'ghcr.io/lynh7/job-aggregator-candidate-worker',
              },
              'crawler-api': {
                  'dockerfile': 'docker/crawler-api.Dockerfile',
                  'image': 'ghcr.io/lynh7/job-aggregator-crawler-api',
              },
              'crawler-api-browser': {
                  'dockerfile': 'docker/crawler-api-browser.Dockerfile',
                  'image': 'ghcr.io/lynh7/job-aggregator-crawler-api-browser',
              },
          }

          event_name = os.environ['EVENT_NAME']
          before_sha = os.environ.get('BEFORE_SHA', '').strip()
          current_sha = os.environ['CURRENT_SHA']

          def all_components(reason: str):
              names = list(images)
              print(reason)
              return names

          if event_name == 'workflow_dispatch':
              selected = all_components('Manual dispatch: build every image.')
          elif not before_sha or set(before_sha) == {'0'}:
              selected = all_components('No usable previous SHA: build every image.')
          else:
              diff = subprocess.check_output(
                  ['git', 'diff', '--name-only', f'{before_sha}..{current_sha}'],
                  text=True,
              )
              changed = [line.strip() for line in diff.splitlines() if line.strip()]
              print('Changed files:')
              for path in changed:
                  print(f'  - {path}')

              selected = set()
              shared_all_files = {
                  '.dockerignore',
                  'cloudbuild.remote.yaml',
                  'pyproject.toml',
                  '.github/workflows/build-via-cloud-build.yml',
              }
              if any(path in shared_all_files for path in changed):
                  selected = set(images)
              else:
                  for path in changed:
                      if path.startswith('app/') or path == 'docker/job-api.Dockerfile':
                          selected.add('job-api')
                      if path.startswith('candidate_service/') or path in {
                          'docker/candidate-api.Dockerfile',
                          'docker/candidate-worker.Dockerfile',
                      }:
                          selected.update({'candidate-api', 'candidate-worker'})
                      if path.startswith('crawler_service/') or path in {
                          'docker/crawler-api.Dockerfile',
                          'docker/crawler-api-browser.Dockerfile',
                      }:
                          selected.update({'crawler-api', 'crawler-api-browser'})

              selected = sorted(selected)
              if selected:
                  print('Selected images: ' + ', '.join(selected))
              else:
                  print('No image-producing paths changed.')

          matrix = [
              {
                  'name': name,
                  'dockerfile': images[name]['dockerfile'],
                  'image': images[name]['image'],
                  'context': '.',
              }
              for name in selected
          ]

          output = Path(os.environ['GITHUB_OUTPUT'])
          with output.open('a', encoding='utf-8') as fh:
              fh.write(f"matrix={json.dumps(matrix, separators=(',', ':'))}\n")
              fh.write(f"count={len(matrix)}\n")
              fh.write(f"names={','.join(item['name'] for item in matrix)}\n")
          PY

      - name: Show build selection
        run: |
          echo "Image count: ${{ steps.detect.outputs.count }}"
          echo "Images: ${{ steps.detect.outputs.names }}"

  resolve-version:
    needs:
      - detect-images
    if: ${{ needs.detect-images.outputs.count != '0' }}
    runs-on:
      - self-hosted
    outputs:
      git_tag: ${{ steps.version.outputs.git_tag }}
      semver: ${{ steps.version.outputs.semver }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Resolve next patch version
        id: version
        run: |
          python3 - <<'PY'
          import re
          import subprocess
          from pathlib import Path
          import os

          tags = subprocess.check_output(
              ['git', 'tag', '--list', 'v*', '--sort=version:refname'],
              text=True,
          ).splitlines()
          tags = [tag.strip() for tag in tags if tag.strip()]
          latest = tags[-1] if tags else None

          if latest is None:
              next_tag = 'v0.1.0'
          else:
              match = re.fullmatch(r'v(\d+)\.(\d+)\.(\d+)', latest)
              if not match:
                  raise RuntimeError(f'Latest version tag has unexpected format: {latest!r}')
              major, minor, patch = map(int, match.groups())
              next_tag = f'v{major}.{minor}.{patch + 1}'

          semver = next_tag.removeprefix('v')
          print(f'Latest version tag: {latest or "<none>"}')
          print(f'Next version tag: {next_tag}')

          output = Path(os.environ['GITHUB_OUTPUT'])
          with output.open('a', encoding='utf-8') as fh:
              fh.write(f'git_tag={next_tag}\n')
              fh.write(f'semver={semver}\n')
          PY

  cloud-build:
    needs:
      - detect-images
      - resolve-version
    if: ${{ needs.detect-images.outputs.count != '0' }}
    runs-on:
      - self-hosted
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-images.outputs.matrix) }}
    env:
      GHCR_USERNAME: trthienan17
      VERSION_TAG: ${{ needs.resolve-version.outputs.git_tag }}
      VERSION_SEMVER: ${{ needs.resolve-version.outputs.semver }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Export CLOUDSDK_PYTHON
        run: |
          PYTHON_BIN=$(python3 -c 'import sys; print(sys.executable)')
          echo "Using Python: ${PYTHON_BIN}"
          ${PYTHON_BIN} --version
          echo "CLOUDSDK_PYTHON=${PYTHON_BIN}" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Verify gcloud installation
        run: gcloud --version

      - name: Stop if monthly Cloud Build usage too high
        env:
          GCP_PROJECT_INPUT: ${{ env.GCP_PROJECT_ID }}
          CLOUD_BUILD_MAX_MINUTES: '2200'
        run: |
          python3 - <<'PY'
          import datetime
          import json
          import os
          import re
          import subprocess
          import sys

          project_input = os.environ['GCP_PROJECT_INPUT']
          raw_limit = os.environ.get('CLOUD_BUILD_MAX_MINUTES', '').strip()

          if not re.fullmatch(r'\d+', raw_limit):
              raise RuntimeError(
                  f"CLOUD_BUILD_MAX_MINUTES invalid: {raw_limit!r}. Expected digits like '2200'."
              )

          limit = int(raw_limit)

          project_id = subprocess.check_output(
              [
                  'gcloud', 'projects', 'describe', project_input,
                  '--format=value(projectId)'
              ],
              text=True,
          ).strip()

          now = datetime.datetime.now(datetime.UTC)
          month_start = now.replace(
              day=1, hour=0, minute=0, second=0, microsecond=0
          ).isoformat().replace('+00:00', 'Z')

          out = subprocess.check_output(
              [
                  'gcloud', 'builds', 'list',
                  f'--project={project_id}',
                  f'--filter=createTime>={month_start}',
                  '--format=json',
              ],
              text=True,
          )
          builds = json.loads(out)

          total_seconds = 0
          for build in builds:
              start = build.get('startTime')
              finish = build.get('finishTime')
              if not start or not finish:
                  continue
              s = datetime.datetime.fromisoformat(start.replace('Z', '+00:00'))
              f = datetime.datetime.fromisoformat(finish.replace('Z', '+00:00'))
              total_seconds += max(0, (f - s).total_seconds())

          minutes = total_seconds / 60
          print(f'Resolved project ID: {project_id}')
          print(f'Cloud Build minutes this month: {minutes:.1f}')
          print(f'Guard limit: {limit}')

          if minutes >= limit:
              print('Build blocked: monthly Cloud Build usage limit reached.', file=sys.stderr)
              sys.exit(1)
          PY

      - name: Submit remote build
        env:
          CLOUDSDK_CORE_DISABLE_PROMPTS: '1'
          GHCR_IMAGE: ${{ matrix.image }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          BUILD_CONTEXT: ${{ matrix.context }}
        run: |
          echo "Submitting Cloud Build for ${GHCR_IMAGE}:${VERSION_SEMVER}"
          echo "Component: ${{ matrix.name }}"
          echo "Version tag: ${VERSION_TAG}"

          PROJECT_ID="$(gcloud projects describe "${GCP_PROJECT_ID}" --format='value(projectId)')"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "Using project: ${PROJECT_ID}"
          echo "Using repo: ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          echo "Using Dockerfile: ${DOCKERFILE}"

          gcloud builds submit \
            --project="${PROJECT_ID}" \
            --no-source \
            --config=cloudbuild.remote.yaml \
            --substitutions=_REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git",_REVISION="${GITHUB_SHA}",_SHORT_SHA="${SHORT_SHA}",_GHCR_IMAGE="${GHCR_IMAGE}",_GHCR_USERNAME="${GHCR_USERNAME}",_DOCKERFILE="${DOCKERFILE}",_CONTEXT="${BUILD_CONTEXT}",_GITHUB_REPOSITORY="${GITHUB_REPOSITORY}",_SEMVER_TAG="${VERSION_SEMVER}"

  create-version-tag:
    needs:
      - detect-images
      - resolve-version
      - cloud-build
    if: ${{ needs.detect-images.outputs.count != '0' && needs.cloud-build.result == 'success' }}
    runs-on:
      - self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Create repository tag
        env:
          VERSION_TAG: ${{ needs.resolve-version.outputs.git_tag }}
        run: |
          if git rev-parse -q --verify "refs/tags/${VERSION_TAG}" >/dev/null; then
            echo "Tag ${VERSION_TAG} already exists locally; skipping create."
            exit 0
          fi

          if git ls-remote --tags origin "refs/tags/${VERSION_TAG}" | grep -q "${VERSION_TAG}$"; then
            echo "Tag ${VERSION_TAG} already exists on origin; skipping create."
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag "${VERSION_TAG}" "${GITHUB_SHA}"
          git push origin "${VERSION_TAG}"

  no-op:
    needs:
      - detect-images
    if: ${{ needs.detect-images.outputs.count == '0' }}
    runs-on:
      - self-hosted
    steps:
      - name: No images selected
        run: echo 'No image-producing paths changed; skipping remote builds.'
