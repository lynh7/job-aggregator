name: Build Container Via Cloud Build

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'shared/**'
      - 'candidate_service/**'
      - 'crawler_service/**'
      - 'docker/**'
      - 'pyproject.toml'
      - '.dockerignore'
      - 'cloudbuild.remote.yaml'
      - '.github/workflows/build-via-cloud-build.yml'
      - '.github/scripts/**'
  workflow_dispatch:
    inputs:
      run_mode:
        description: 'Choose release to build/publish or test to validate the flow without publishing'
        required: true
        default: release
        type: choice
        options:
          - release
          - test
      build_scope:
        description: 'Choose auto to respect changed paths or all to force every image through the flow'
        required: true
        default: all
        type: choice
        options:
          - all
          - auto

permissions:
  contents: write

concurrency:
  group: cloud-build-main
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

jobs:
  detect-images:
    runs-on:
      - self-hosted
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      count: ${{ steps.detect.outputs.count }}
      names: ${{ steps.detect.outputs.names }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect images to build
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          RUN_MODE: ${{ github.event.inputs.run_mode }}
          BUILD_SCOPE: ${{ github.event.inputs.build_scope }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          images = {
              'job-api': {
                  'dockerfile': 'docker/job-api.Dockerfile',
                  'image': 'ghcr.io/lynh7/job-aggregator-job-api',
              },
              'candidate-api': {
                  'dockerfile': 'docker/candidate-api.Dockerfile',
                  'image': 'ghcr.io/lynh7/job-aggregator-candidate-api',
              },
              'candidate-worker': {
                  'dockerfile': 'docker/candidate-worker.Dockerfile',
                  'image': 'ghcr.io/lynh7/job-aggregator-candidate-worker',
              },
              'crawler-api': {
                  'dockerfile': 'docker/crawler-api.Dockerfile',
                  'image': 'ghcr.io/lynh7/job-aggregator-crawler-api',
              },
              'crawler-api-browser': {
                  'dockerfile': 'docker/crawler-api-browser.Dockerfile',
                  'image': 'ghcr.io/lynh7/job-aggregator-crawler-api-browser',
              },
          }

          event_name = os.environ['EVENT_NAME']
          run_mode = os.environ.get('RUN_MODE', '').strip() or 'release'
          build_scope = os.environ.get('BUILD_SCOPE', '').strip() or 'all'
          before_sha = os.environ.get('BEFORE_SHA', '').strip()
          current_sha = os.environ['CURRENT_SHA']

          def all_components(reason: str):
              names = list(images)
              print(reason)
              return names

          if event_name == 'workflow_dispatch' and build_scope == 'all':
              selected = all_components(
                  f"Manual dispatch ({run_mode}): force every image through the flow."
              )
          elif event_name == 'workflow_dispatch' and build_scope == 'auto':
              print(f"Manual dispatch ({run_mode}): using changed-path detection.")
              diff = subprocess.check_output(
                  ['git', 'diff', '--name-only', 'HEAD^..HEAD'],
                  text=True,
              )
              changed = [line.strip() for line in diff.splitlines() if line.strip()]
              print('Changed files:')
              for path in changed:
                  print(f'  - {path}')

              selected = set()
              shared_all_files = {
                  '.dockerignore',
                  'cloudbuild.remote.yaml',
                  'pyproject.toml',
                  '.github/workflows/build-via-cloud-build.yml',
                  '.github/workflows/release-helm-chart.yml',
                  '.github/scripts/chart_versioning.py',
              }
              if any(path in shared_all_files for path in changed):
                  selected = set(images)
              else:
                  for path in changed:
                      if path.startswith('app/'):
                          selected.add('job-api')
                      if path.startswith('shared/'):
                          selected.update(images)
                      if path == 'docker/job-api.Dockerfile':
                          selected.add('job-api')
                      if path.startswith('candidate_service/') or path in {
                          'docker/candidate-api.Dockerfile',
                          'docker/candidate-worker.Dockerfile',
                      }:
                          selected.update({'candidate-api', 'candidate-worker'})
                      if path.startswith('crawler_service/') or path in {
                          'docker/crawler-api.Dockerfile',
                          'docker/crawler-api-browser.Dockerfile',
                      }:
                          selected.update({'crawler-api', 'crawler-api-browser'})

              selected = sorted(selected)
              if selected:
                  print('Selected images: ' + ', '.join(selected))
              else:
                  print('No image-producing paths changed.')
          elif not before_sha or set(before_sha) == {'0'}:
              selected = all_components('No usable previous SHA: build every image.')
          else:
              diff = subprocess.check_output(
                  ['git', 'diff', '--name-only', f'{before_sha}..{current_sha}'],
                  text=True,
              )
              changed = [line.strip() for line in diff.splitlines() if line.strip()]
              print('Changed files:')
              for path in changed:
                  print(f'  - {path}')

              selected = set()
              shared_all_files = {
                  '.dockerignore',
                  'cloudbuild.remote.yaml',
                  'pyproject.toml',
                  '.github/workflows/build-via-cloud-build.yml',
                  '.github/workflows/release-helm-chart.yml',
                  '.github/scripts/chart_versioning.py',
              }
              if any(path in shared_all_files for path in changed):
                  selected = set(images)
              else:
                  for path in changed:
                      if path.startswith('app/'):
                          selected.add('job-api')
                      if path.startswith('shared/'):
                          selected.update(images)
                      if path == 'docker/job-api.Dockerfile':
                          selected.add('job-api')
                      if path.startswith('candidate_service/') or path in {
                          'docker/candidate-api.Dockerfile',
                          'docker/candidate-worker.Dockerfile',
                      }:
                          selected.update({'candidate-api', 'candidate-worker'})
                      if path.startswith('crawler_service/') or path in {
                          'docker/crawler-api.Dockerfile',
                          'docker/crawler-api-browser.Dockerfile',
                      }:
                          selected.update({'crawler-api', 'crawler-api-browser'})

              selected = sorted(selected)
              if selected:
                  print('Selected images: ' + ', '.join(selected))
              else:
                  print('No image-producing paths changed.')

          matrix = [
              {
                  'name': name,
                  'dockerfile': images[name]['dockerfile'],
                  'image': images[name]['image'],
                  'context': '.',
              }
              for name in selected
          ]

          output = Path(os.environ['GITHUB_OUTPUT'])
          with output.open('a', encoding='utf-8') as fh:
              fh.write(f"matrix={json.dumps(matrix, separators=(',', ':'))}\n")
              fh.write(f"count={len(matrix)}\n")
              fh.write(f"names={','.join(item['name'] for item in matrix)}\n")
          PY

      - name: Show build selection
        run: |
          echo "Image count: ${{ steps.detect.outputs.count }}"
          echo "Images: ${{ steps.detect.outputs.names }}"

  resolve-versions:
    needs:
      - detect-images
    if: ${{ needs.detect-images.outputs.count != '0' }}
    runs-on:
      - self-hosted
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      chart_version: ${{ steps.plan.outputs.chart_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Plan image and chart versions
        id: plan
        env:
          DETECTED_MATRIX: ${{ needs.detect-images.outputs.matrix }}
        run: |
          export PLAN_JSON
          PLAN_JSON="$(python3 .github/scripts/chart_versioning.py plan-build --matrix-json "${DETECTED_MATRIX}")"
          echo "Planned release state: ${PLAN_JSON}"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(os.environ["PLAN_JSON"])
          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as fh:
              fh.write(f"matrix={json.dumps(payload['matrix'], separators=(',', ':'))}\n")
              fh.write(f"chart_version={payload['chart_version']}\n")
          PY
        shell: bash

  cloud-build:
    needs:
      - detect-images
      - resolve-versions
    if: ${{ needs.detect-images.outputs.count != '0' && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode != 'test') }}
    runs-on:
      - self-hosted
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.resolve-versions.outputs.matrix) }}
    env:
      GHCR_USERNAME: trthienan17
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Export CLOUDSDK_PYTHON
        run: |
          PYTHON_BIN=$(python3 -c 'import sys; print(sys.executable)')
          echo "Using Python: ${PYTHON_BIN}"
          ${PYTHON_BIN} --version
          echo "CLOUDSDK_PYTHON=${PYTHON_BIN}" >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Verify gcloud installation
        run: gcloud --version

      - name: Stop if monthly Cloud Build usage too high
        env:
          GCP_PROJECT_INPUT: ${{ env.GCP_PROJECT_ID }}
          CLOUD_BUILD_MAX_MINUTES: '2200'
        run: |
          python3 - <<'PY'
          import datetime
          import json
          import os
          import re
          import subprocess
          import sys

          project_input = os.environ['GCP_PROJECT_INPUT']
          raw_limit = os.environ.get('CLOUD_BUILD_MAX_MINUTES', '').strip()

          if not re.fullmatch(r'\d+', raw_limit):
              raise RuntimeError(
                  f"CLOUD_BUILD_MAX_MINUTES invalid: {raw_limit!r}. Expected digits like '2200'."
              )

          limit = int(raw_limit)

          project_id = subprocess.check_output(
              [
                  'gcloud', 'projects', 'describe', project_input,
                  '--format=value(projectId)'
              ],
              text=True,
          ).strip()

          now = datetime.datetime.now(datetime.UTC)
          month_start = now.replace(
              day=1, hour=0, minute=0, second=0, microsecond=0
          ).isoformat().replace('+00:00', 'Z')

          out = subprocess.check_output(
              [
                  'gcloud', 'builds', 'list',
                  f'--project={project_id}',
                  f'--filter=createTime>={month_start}',
                  '--format=json',
              ],
              text=True,
          )
          builds = json.loads(out)

          total_seconds = 0
          for build in builds:
              start = build.get('startTime')
              finish = build.get('finishTime')
              if not start or not finish:
                  continue
              s = datetime.datetime.fromisoformat(start.replace('Z', '+00:00'))
              f = datetime.datetime.fromisoformat(finish.replace('Z', '+00:00'))
              total_seconds += max(0, (f - s).total_seconds())

          minutes = total_seconds / 60
          print(f'Resolved project ID: {project_id}')
          print(f'Cloud Build minutes this month: {minutes:.1f}')
          print(f'Guard limit: {limit}')

          if minutes >= limit:
              print('Build blocked: monthly Cloud Build usage limit reached.', file=sys.stderr)
              sys.exit(1)
          PY

      - name: Submit remote build
        env:
          CLOUDSDK_CORE_DISABLE_PROMPTS: '1'
          GHCR_IMAGE: ${{ matrix.image }}
          DOCKERFILE: ${{ matrix.dockerfile }}
          BUILD_CONTEXT: ${{ matrix.context }}
          IMAGE_VERSION: ${{ matrix.version }}
        run: |
          echo "Submitting Cloud Build for ${GHCR_IMAGE}:${IMAGE_VERSION}"
          echo "Component: ${{ matrix.name }}"
          echo "Version tag: ${IMAGE_VERSION}"

          PROJECT_ID="$(gcloud projects describe "${GCP_PROJECT_ID}" --format='value(projectId)')"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "Using project: ${PROJECT_ID}"
          echo "Using repo: ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          echo "Using Dockerfile: ${DOCKERFILE}"

          gcloud builds submit \
            --project="${PROJECT_ID}" \
            --no-source \
            --config=cloudbuild.remote.yaml \
            --substitutions=_REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git",_REVISION="${GITHUB_SHA}",_SHORT_SHA="${SHORT_SHA}",_GHCR_IMAGE="${GHCR_IMAGE}",_GHCR_USERNAME="${GHCR_USERNAME}",_DOCKERFILE="${DOCKERFILE}",_CONTEXT="${BUILD_CONTEXT}",_GITHUB_REPOSITORY="${GITHUB_REPOSITORY}",_SEMVER_TAG="${IMAGE_VERSION}"

  sync-chart-state:
    needs:
      - detect-images
      - resolve-versions
      - cloud-build
    if: ${{ needs.detect-images.outputs.count != '0' && needs.cloud-build.result == 'success' && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_mode != 'test') }}
    runs-on:
      - self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply chart image tags and chart version
        env:
          BUILD_MATRIX: ${{ needs.resolve-versions.outputs.matrix }}
          CHART_VERSION: ${{ needs.resolve-versions.outputs.chart_version }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          python3 .github/scripts/chart_versioning.py apply-release-state \
            --matrix-json "${BUILD_MATRIX}" \
            --chart-version "${CHART_VERSION}"

          if git diff --quiet -- helm-chart/Chart.yaml helm-chart/values.yaml; then
            echo "Chart files already up to date."
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add helm-chart/Chart.yaml helm-chart/values.yaml
          git commit -m "Update chart defaults for release v${CHART_VERSION}"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Validate updated default chart render
        run: helm template job-aggregator ./helm-chart

      - name: Validate updated browser crawler render
        run: helm template job-aggregator ./helm-chart -f ./helm-chart/examples/browser-crawler.values.yaml

      - name: Validate updated shared PVC override render
        run: helm template job-aggregator ./helm-chart -f ./helm-chart/examples/existing-shared-pvc.values.yaml

      - name: Validate updated NATS render
        run: helm template job-aggregator ./helm-chart -f ./helm-chart/examples/nats.values.yaml

      - name: Package updated chart
        env:
          CHART_VERSION: ${{ needs.resolve-versions.outputs.chart_version }}
        run: |
          mkdir -p .release/packages
          helm package ./helm-chart --destination ./.release/packages
          test -f "./.release/packages/job-aggregator-${CHART_VERSION}.tgz"

      - name: Publish GitHub Pages chart repo
        env:
          CHART_VERSION: ${{ needs.resolve-versions.outputs.chart_version }}
          PAGES_URL: https://lynh7.github.io/job-aggregator
        run: |
          set -euo pipefail

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          rm -rf .release/gh-pages
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages
            git worktree add .release/gh-pages origin/gh-pages
            (
              cd .release/gh-pages
              git checkout -B gh-pages origin/gh-pages
            )
          else
            git worktree add --detach .release/gh-pages
            (
              cd .release/gh-pages
              git checkout --orphan gh-pages
              find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
            )
          fi

          cp ./.release/packages/*.tgz ./.release/gh-pages/
          touch ./.release/gh-pages/.nojekyll
          helm repo index ./.release/gh-pages --url "${PAGES_URL}"

          (
            cd .release/gh-pages
            git add .
            if git diff --cached --quiet; then
              echo "No chart repository changes to publish."
              exit 0
            fi
            git commit -m "Release Helm chart v${CHART_VERSION}"
            git push origin gh-pages
          )

  test-release-flow:
    needs:
      - detect-images
      - resolve-versions
    if: ${{ needs.detect-images.outputs.count != '0' && github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'test' }}
    runs-on:
      - self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Simulate chart update
        env:
          BUILD_MATRIX: ${{ needs.resolve-versions.outputs.matrix }}
          CHART_VERSION: ${{ needs.resolve-versions.outputs.chart_version }}
        run: |
          cp -R helm-chart /tmp/job-aggregator-test-chart
          python3 .github/scripts/chart_versioning.py apply-release-state \
            --matrix-json "${BUILD_MATRIX}" \
            --chart-version "${CHART_VERSION}" \
            --values-file /tmp/job-aggregator-test-chart/values.yaml \
            --chart-file /tmp/job-aggregator-test-chart/Chart.yaml

      - name: Validate simulated default chart render
        run: helm template job-aggregator /tmp/job-aggregator-test-chart

      - name: Validate simulated browser crawler render
        run: helm template job-aggregator /tmp/job-aggregator-test-chart -f /tmp/job-aggregator-test-chart/examples/browser-crawler.values.yaml

      - name: Validate simulated shared PVC override render
        run: helm template job-aggregator /tmp/job-aggregator-test-chart -f /tmp/job-aggregator-test-chart/examples/existing-shared-pvc.values.yaml

      - name: Validate simulated NATS render
        run: helm template job-aggregator /tmp/job-aggregator-test-chart -f /tmp/job-aggregator-test-chart/examples/nats.values.yaml

      - name: Package simulated chart
        env:
          CHART_VERSION: ${{ needs.resolve-versions.outputs.chart_version }}
        run: |
          mkdir -p /tmp/job-aggregator-test-packages
          helm package /tmp/job-aggregator-test-chart --destination /tmp/job-aggregator-test-packages
          test -f "/tmp/job-aggregator-test-packages/job-aggregator-${CHART_VERSION}.tgz"

  no-op:
    needs:
      - detect-images
    if: ${{ needs.detect-images.outputs.count == '0' }}
    runs-on:
      - self-hosted
    steps:
      - name: No images selected
        run: echo 'No image-producing paths changed; skipping remote builds.'
